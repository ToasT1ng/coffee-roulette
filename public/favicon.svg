<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="105 95 820 840" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="topFace" cx="48%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="58%" stop-color="#F7F7F7"/>
      <stop offset="100%" stop-color="#E2E2E4"/>
    </radialGradient>

    <linearGradient id="leftFace" x1="260" y1="390" x2="560" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F0F0F2"/>
      <stop offset="60%" stop-color="#D8D8DC"/>
      <stop offset="100%" stop-color="#C9C9CD"/>
    </linearGradient>

    <linearGradient id="rightFace" x1="740" y1="390" x2="520" y2="870" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EEEEF0"/>
      <stop offset="58%" stop-color="#DADADD"/>
      <stop offset="100%" stop-color="#C8C8CB"/>
    </linearGradient>

    <radialGradient id="redPip" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FF635D"/>
      <stop offset="100%" stop-color="#F43B36"/>
    </radialGradient>

    <radialGradient id="darkPip" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1B2B43"/>
      <stop offset="100%" stop-color="#071225"/>
    </radialGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000000" flood-opacity="0.14"/>
    </filter>

    <filter id="innerShade">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- Dice body faces -->
    <path d="M165 391
             C165 322 205 257 267 224
             L440 132
             C486 108 540 108 586 132
             L759 224
             C821 257 861 322 861 391
             L861 629
             C861 696 825 759 766 794
             L594 895
             C545 923 484 923 435 895
             L263 794
             C204 759 165 696 165 629
             Z"
          fill="#DDDDDF"/>

    <!-- top rounded diamond-like face -->
    <path d="M206 367
             C225 303 267 249 324 219
             L443 157
             C486 135 540 135 581 157
             L700 219
             C757 249 799 303 818 367
             C824 390 813 414 792 426
             L574 548
             C536 569 490 569 452 548
             L234 426
             C213 414 200 390 206 367 Z"
          fill="url(#topFace)"/>

    <!-- left face -->
    <path d="M206 367
             C200 390 213 414 234 426
             L452 548
             C490 569 513 610 513 653
             L513 844
             C513 892 461 922 419 898
             L263 805
             C201 768 165 701 165 629
             L165 407
             C165 384 184 365 206 367 Z"
          fill="url(#leftFace)"/>

    <!-- right face -->
    <path d="M818 367
             C824 390 813 414 792 426
             L574 548
             C536 569 513 610 513 653
             L513 844
             C513 892 565 922 607 898
             L763 805
             C825 768 861 701 861 629
             L861 407
             C861 384 840 365 818 367 Z"
          fill="url(#rightFace)"/>

    <!-- center ridge highlight -->
    <path d="M513 548 C507 642 507 748 513 844" stroke="#F4F4F5" stroke-width="18" stroke-linecap="round" opacity="0.45"/>

    <!-- soft top edge highlight -->
    <path d="M228 373 C320 423 408 474 452 498 C490 519 536 519 574 498 C630 467 721 414 796 373"
          fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" opacity="0.35"/>

    <!-- red pip on top -->
    <ellipse cx="514" cy="324" rx="79" ry="49" fill="url(#redPip)"/>

    <!-- left face pips -->
    <ellipse cx="235" cy="496" rx="31" ry="48" transform="rotate(-24 235 496)" fill="url(#darkPip)"/>
    <ellipse cx="325" cy="615" rx="31" ry="48" transform="rotate(-24 325 615)" fill="url(#darkPip)"/>
    <ellipse cx="409" cy="744" rx="31" ry="48" transform="rotate(-24 409 744)" fill="url(#darkPip)"/>

    <!-- right face pips -->
    <ellipse cx="664" cy="596" rx="31" ry="48" transform="rotate(24 664 596)" fill="url(#darkPip)"/>
    <ellipse cx="780" cy="667" rx="31" ry="48" transform="rotate(24 780 667)" fill="url(#darkPip)"/>
  </g>
</svg>
